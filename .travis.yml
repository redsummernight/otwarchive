dist: bionic

language: ruby
cache: bundler

if: tag IS blank

env:
  - RUN=00 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=01 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=02 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=03 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=04 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=05 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=06 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=07 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=08 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"
  - RUN=09 TEST_GROUP="cucumber features/importing/archivist_creatorships.feature"

services:
  - redis
  - memcached

addons:
  mariadb: '10.5'

before_install:
  - bash script/travis/ebook_converters.sh

before_script:
  - bash script/travis/configure.sh
  - bash script/travis/elasticsearch_upgrade.sh
  - bash script/travis/multiple_redis.sh
  - bash script/travis/mysql.sh

script:
  - export RAILS_ENV=test
  - export CUCUMBER_FORMAT=Ao3Cucumber::Formatter
  - export CUCUMBER_RETRY=1
  - bundle exec rake db:create
  - bundle exec rake db:schema:load
  - bundle exec rake db:migrate
  - bundle exec "$TEST_GROUP"

after_failure:
  - tail -v -n +1 $TRAVIS_BUILD_DIR/tmp/capybara/*.html
